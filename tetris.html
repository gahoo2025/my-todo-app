<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <title>テトリス | My Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1020;
      --panel: #1b1d33;
      --panel2: #24264180;
      --grid: #2a2c4a;
      --text: #e6e7f5;
      --muted: #9aa0c4;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #1a1c38, var(--bg));
      color: var(--text);
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 12px;
      touch-action: none;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .wrap {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .board-shell {
      position: relative;
      border-radius: 14px;
      padding: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px -18px rgba(0,0,0,.8), inset 0 0 0 1px #ffffff10;
    }
    canvas { display: block; border-radius: 8px; background: #0c0d1c; }
    .side {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 116px;
    }
    .card {
      background: var(--panel);
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 1px #ffffff0d;
    }
    .card h2 {
      font-size: .68rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .14em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .stat { font-size: 1.35rem; font-weight: 700; line-height: 1.1; }
    .mini { display: block; margin: 0 auto; }
    .overlay {
      position: absolute;
      inset: 8px;
      border-radius: 8px;
      background: #0c0d1ce6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 16px;
      backdrop-filter: blur(2px);
    }
    .overlay.hidden { display: none; }
    .overlay .big { font-size: 1.5rem; font-weight: 700; }
    .overlay .sub { color: var(--muted); font-size: .85rem; line-height: 1.6; }
    button.play {
      border: none;
      cursor: pointer;
      padding: 11px 26px;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 700;
      font-size: .95rem;
      color: white;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      box-shadow: 0 10px 24px -10px #6366f1;
      transition: transform .08s ease;
    }
    button.play:active { transform: scale(.96); }
    .hint {
      font-size: .68rem;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }
    kbd {
      background: var(--panel2);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: inherit;
      font-size: .66rem;
      box-shadow: inset 0 0 0 1px #ffffff14;
    }
    /* touch controls */
    .touch {
      display: none;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }
    .touch .row { display: flex; gap: 10px; flex: 1; }
    .touch button {
      flex: 1;
      border: none;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      padding: 16px 0;
      border-radius: 12px;
      background: var(--panel);
      box-shadow: inset 0 0 0 1px #ffffff12;
      user-select: none;
    }
    .touch button:active { background: var(--accent); }
    @media (max-width: 640px) {
      .touch { display: flex; }
      .hint.desktop { display: none; }
    }
  </style>
</head>
<body>
  <h1>TETRIS</h1>
  <div class="wrap">
    <div class="board-shell">
      <canvas id="board"></canvas>
      <div class="overlay" id="overlay">
        <div class="big" id="ovTitle">テトリス</div>
        <div class="sub" id="ovText">ブロックを積んで<br>ラインを消そう！</div>
        <button class="play" id="startBtn">スタート</button>
      </div>
    </div>
    <div class="side">
      <div class="card">
        <h2>Score</h2>
        <div class="stat" id="score">0</div>
      </div>
      <div class="card">
        <h2>Lines</h2>
        <div class="stat" id="lines">0</div>
      </div>
      <div class="card">
        <h2>Level</h2>
        <div class="stat" id="level">1</div>
      </div>
      <div class="card">
        <h2>Next</h2>
        <canvas id="next" class="mini"></canvas>
      </div>
      <div class="card">
        <h2>Hold</h2>
        <canvas id="hold" class="mini"></canvas>
      </div>
    </div>
  </div>

  <div class="touch" id="touch">
    <div class="row">
      <button data-act="left">◀</button>
      <button data-act="rotate">⟳</button>
      <button data-act="right">▶</button>
    </div>
    <div class="row">
      <button data-act="hold">HOLD</button>
      <button data-act="down">▼</button>
      <button data-act="drop">⤓</button>
    </div>
  </div>

  <div class="hint desktop">
    <kbd>←</kbd> <kbd>→</kbd> 移動 ・ <kbd>↑</kbd>/<kbd>X</kbd> 回転 ・ <kbd>↓</kbd> ソフトドロップ ・
    <kbd>Space</kbd> ハードドロップ ・ <kbd>C</kbd> ホールド ・ <kbd>P</kbd> ポーズ
  </div>

  <script>
  (() => {
    const COLS = 10, ROWS = 20;
    const CELL = 30;            // 盤面セルサイズ
    const HIDDEN = 2;           // 上部の見えない行（スポーン用）

    const COLORS = {
      I: '#22d3ee', O: '#fbbf24', T: '#c084fc', S: '#34d399',
      Z: '#f87171', J: '#60a5fa', L: '#fb923c', G: '#3a3d63'
    };

    // 各テトロミノの回転状態（4方向）を4x4グリッドの座標で定義
    const SHAPES = {
      I: [[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],
      O: [[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]]],
      T: [[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],
      S: [[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]],
      Z: [[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]],
      J: [[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],
      L: [[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]],
    };

    // SRS壁蹴りオフセット（JLSTZ用 / I用）
    const KICKS = {
      normal: {
        '0>1': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
        '1>0': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
        '1>2': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
        '2>1': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
        '2>3': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
        '3>2': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
        '3>0': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
        '0>3': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
      },
      I: {
        '0>1': [[0,0],[-2,0],[1,0],[-2,-1],[1,2]],
        '1>0': [[0,0],[2,0],[-1,0],[2,1],[-1,-2]],
        '1>2': [[0,0],[-1,0],[2,0],[-1,2],[2,-1]],
        '2>1': [[0,0],[1,0],[-2,0],[1,-2],[-2,1]],
        '2>3': [[0,0],[2,0],[-1,0],[2,1],[-1,-2]],
        '3>2': [[0,0],[-2,0],[1,0],[-2,-1],[1,2]],
        '3>0': [[0,0],[1,0],[-2,0],[1,-2],[-2,1]],
        '0>3': [[0,0],[-1,0],[2,0],[-1,2],[2,-1]],
      }
    };

    const TYPES = ['I','O','T','S','Z','J','L'];

    const board = document.getElementById('board');
    const bctx = board.getContext('2d');
    const nextCv = document.getElementById('next');
    const nctx = nextCv.getContext('2d');
    const holdCv = document.getElementById('hold');
    const hctx = holdCv.getContext('2d');

    // 高解像度対応
    function setupCanvas(cv, ctx, w, h) {
      const dpr = window.devicePixelRatio || 1;
      cv.width = w * dpr; cv.height = h * dpr;
      cv.style.width = w + 'px'; cv.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    setupCanvas(board, bctx, COLS * CELL, ROWS * CELL);
    setupCanvas(nextCv, nctx, 96, 64);
    setupCanvas(holdCv, hctx, 96, 64);

    const $ = id => document.getElementById(id);
    const ui = { score: $('score'), lines: $('lines'), level: $('level') };

    let grid, cur, nextType, holdType, canHold;
    let score, lines, level, dropCounter, dropInterval, lastTime;
    let state = 'idle'; // idle | playing | paused | over
    let bag = [];
    let rafId = null;

    function newGrid() {
      return Array.from({ length: ROWS + HIDDEN }, () => Array(COLS).fill(null));
    }

    function refillBag() {
      const b = [...TYPES];
      for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
      }
      bag.push(...b);
    }
    function nextFromBag() {
      if (bag.length === 0) refillBag();
      return bag.shift();
    }

    function spawn(type) {
      const t = type || nextFromBag();
      cur = { type: t, rot: 0, x: 3, y: 0 };
      if (collides(cur)) { gameOver(); return; }
    }

    function cells(piece) {
      return SHAPES[piece.type][piece.rot].map(([cx, cy]) => [piece.x + cx, piece.y + cy]);
    }

    function collides(piece) {
      return cells(piece).some(([x, y]) =>
        x < 0 || x >= COLS || y >= ROWS + HIDDEN || (y >= 0 && grid[y][x])
      );
    }

    function lock() {
      cells(cur).forEach(([x, y]) => { if (y >= 0) grid[y][x] = cur.type; });
      clearLines();
      canHold = true;
      spawn(nextType);
      nextType = nextFromBag();
      if (state === 'playing') drawSide();
    }

    function clearLines() {
      let cleared = 0;
      for (let y = grid.length - 1; y >= 0; y--) {
        if (grid[y].every(c => c)) {
          grid.splice(y, 1);
          grid.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared) {
        const pts = [0, 100, 300, 500, 800][cleared] * level;
        score += pts;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(80, 1000 - (level - 1) * 80);
        updateStats();
      }
    }

    function updateStats() {
      ui.score.textContent = score;
      ui.lines.textContent = lines;
      ui.level.textContent = level;
    }

    function move(dx) {
      const p = { ...cur, x: cur.x + dx };
      if (!collides(p)) { cur = p; return true; }
      return false;
    }

    function softDrop() {
      const p = { ...cur, y: cur.y + 1 };
      if (!collides(p)) { cur = p; dropCounter = 0; return true; }
      lock();
      return false;
    }

    function hardDrop() {
      let d = 0;
      while (!collides({ ...cur, y: cur.y + 1 })) { cur.y++; d++; }
      score += d * 2;
      updateStats();
      lock();
    }

    function rotate(dir) {
      if (cur.type === 'O') return;
      const from = cur.rot;
      const to = (from + dir + 4) % 4;
      const table = cur.type === 'I' ? KICKS.I : KICKS.normal;
      const kicks = table[`${from}>${to}`] || [[0, 0]];
      for (const [kx, ky] of kicks) {
        const p = { ...cur, rot: to, x: cur.x + kx, y: cur.y + ky };
        if (!collides(p)) { cur = p; return; }
      }
    }

    function hold() {
      if (!canHold) return;
      const prev = holdType;
      holdType = cur.type;
      if (prev) { spawn(prev); }
      else { spawn(nextType); nextType = nextFromBag(); }
      canHold = false;
      drawSide();
    }

    function ghostY() {
      let p = { ...cur };
      while (!collides({ ...p, y: p.y + 1 })) p.y++;
      return p.y;
    }

    // ---- 描画 ----
    function cellRect(ctx, x, y, color, size, alpha) {
      const pad = 1;
      ctx.globalAlpha = alpha == null ? 1 : alpha;
      ctx.fillStyle = color;
      ctx.fillRect(x * size + pad, y * size + pad, size - pad * 2, size - pad * 2);
      // ハイライト
      ctx.globalAlpha = (alpha == null ? 1 : alpha) * 0.25;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x * size + pad, y * size + pad, size - pad * 2, (size - pad * 2) * 0.4);
      ctx.globalAlpha = 1;
    }

    function draw() {
      bctx.clearRect(0, 0, COLS * CELL, ROWS * CELL);
      // 背景グリッド
      bctx.strokeStyle = '#ffffff08';
      bctx.lineWidth = 1;
      for (let x = 1; x < COLS; x++) {
        bctx.beginPath(); bctx.moveTo(x * CELL, 0); bctx.lineTo(x * CELL, ROWS * CELL); bctx.stroke();
      }
      for (let y = 1; y < ROWS; y++) {
        bctx.beginPath(); bctx.moveTo(0, y * CELL); bctx.lineTo(COLS * CELL, y * CELL); bctx.stroke();
      }
      // 固定ブロック（HIDDEN行を除いて描画）
      for (let y = HIDDEN; y < grid.length; y++) {
        for (let x = 0; x < COLS; x++) {
          if (grid[y][x]) cellRect(bctx, x, y - HIDDEN, COLORS[grid[y][x]], CELL);
        }
      }
      if (cur && (state === 'playing' || state === 'paused')) {
        // ゴースト
        const gy = ghostY();
        cells({ ...cur, y: gy }).forEach(([x, y]) => {
          if (y - HIDDEN >= 0) cellRect(bctx, x, y - HIDDEN, COLORS[cur.type], CELL, 0.22);
        });
        // 現在のピース
        cells(cur).forEach(([x, y]) => {
          if (y - HIDDEN >= 0) cellRect(bctx, x, y - HIDDEN, COLORS[cur.type], CELL);
        });
      }
    }

    function drawMini(ctx, cv, type) {
      const w = cv.width / (window.devicePixelRatio || 1);
      const h = cv.height / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, w, h);
      if (!type) return;
      const sz = 14;
      const shape = SHAPES[type][0];
      const xs = shape.map(c => c[0]), ys = shape.map(c => c[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const offX = (w - (maxX - minX + 1) * sz) / 2 - minX * sz;
      const offY = (h - (maxY - minY + 1) * sz) / 2 - minY * sz;
      shape.forEach(([cx, cy]) => {
        ctx.fillStyle = COLORS[type];
        ctx.fillRect(offX + cx * sz + 1, offY + cy * sz + 1, sz - 2, sz - 2);
        ctx.globalAlpha = 0.25; ctx.fillStyle = '#fff';
        ctx.fillRect(offX + cx * sz + 1, offY + cy * sz + 1, sz - 2, (sz - 2) * 0.4);
        ctx.globalAlpha = 1;
      });
    }

    function drawSide() {
      drawMini(nctx, nextCv, nextType);
      drawMini(hctx, holdCv, holdType);
    }

    // ---- ループ ----
    function loop(time) {
      if (state !== 'playing') return;
      const dt = time - lastTime;
      lastTime = time;
      dropCounter += dt;
      if (dropCounter > dropInterval) { softDrop(); dropCounter = 0; }
      draw();
      rafId = requestAnimationFrame(loop);
    }

    function start() {
      grid = newGrid();
      bag = [];
      score = 0; lines = 0; level = 1;
      dropInterval = 1000; dropCounter = 0; lastTime = performance.now();
      holdType = null; canHold = true;
      nextType = nextFromBag();
      spawn(nextFromBag());
      nextType = nextFromBag();
      updateStats();
      drawSide();
      hideOverlay();
      state = 'playing';
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function gameOver() {
      state = 'over';
      cancelAnimationFrame(rafId);
      showOverlay('ゲームオーバー', `スコア: <b>${score}</b><br>ライン: ${lines} ・ レベル: ${level}`, 'もう一度');
    }

    function togglePause() {
      if (state === 'playing') {
        state = 'paused';
        cancelAnimationFrame(rafId);
        showOverlay('ポーズ中', '<kbd>P</kbd> または下のボタンで再開', '再開');
      } else if (state === 'paused') {
        state = 'playing';
        lastTime = performance.now();
        hideOverlay();
        rafId = requestAnimationFrame(loop);
      }
    }

    const overlay = $('overlay');
    function showOverlay(title, text, btn) {
      $('ovTitle').textContent = title;
      $('ovText').innerHTML = text;
      $('startBtn').textContent = btn;
      overlay.classList.remove('hidden');
    }
    function hideOverlay() { overlay.classList.add('hidden'); }

    $('startBtn').addEventListener('click', () => {
      if (state === 'paused') togglePause();
      else start();
    });

    // ---- 入力 ----
    document.addEventListener('keydown', (e) => {
      if (state === 'idle' || state === 'over') {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); start(); }
        return;
      }
      if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
      if (state !== 'playing') return;
      switch (e.key) {
        case 'ArrowLeft':  move(-1); break;
        case 'ArrowRight': move(1); break;
        case 'ArrowDown':  softDrop(); score += 1; updateStats(); break;
        case 'ArrowUp': case 'x': case 'X': rotate(1); break;
        case 'z': case 'Z': rotate(-1); break;
        case ' ': e.preventDefault(); hardDrop(); break;
        case 'c': case 'C': case 'Shift': hold(); break;
        default: return;
      }
      draw();
    });

    // タッチ操作
    const touchActs = {
      left: () => move(-1),
      right: () => move(1),
      down: () => { softDrop(); score += 1; updateStats(); },
      rotate: () => rotate(1),
      drop: () => hardDrop(),
      hold: () => hold(),
    };
    document.getElementById('touch').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || state !== 'playing') return;
      const act = touchActs[btn.dataset.act];
      if (act) { act(); draw(); }
    });

    // スワイプ操作（盤面上）
    let touchStart = null;
    board.addEventListener('touchstart', (e) => {
      if (state !== 'playing') return;
      const t = e.touches[0];
      touchStart = { x: t.clientX, y: t.clientY, time: Date.now(), moved: false };
    }, { passive: true });
    board.addEventListener('touchmove', (e) => {
      if (!touchStart || state !== 'playing') return;
      const t = e.touches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      if (Math.abs(dx) > 24 && Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 1 : -1);
        touchStart.x = t.clientX; touchStart.moved = true;
        draw();
      } else if (dy > 28 && Math.abs(dy) > Math.abs(dx)) {
        softDrop();
        touchStart.y = t.clientY; touchStart.moved = true;
        draw();
      }
    }, { passive: true });
    board.addEventListener('touchend', () => {
      if (touchStart && !touchStart.moved && Date.now() - touchStart.time < 250) {
        rotate(1); draw();
      }
      touchStart = null;
    });

    draw();
    drawSide();
  })();
  </script>
</body>
</html>
